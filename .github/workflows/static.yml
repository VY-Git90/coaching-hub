# Simple workflow for deploying Vite + React to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 2. Install dependencies and compile the production build
      - name: Install and Build
        run: |
          npm ci
          vfile_dont_fail=1 npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          CI: false # 👈 THIS TELLS VITE TO IGNORE WARNINGS AND FORCE THE BUILD
          
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. Upload only the compiled 'dist' folder, NOT the whole repository
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # 4. Deploy the compiled files
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
